# Build and deploy the Vite app to GitHub Pages
# After first run: enable in repo Settings → Pages → Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Root base path for custom domain (karenkodera.com)
      VITE_BASE_PATH: /
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true  # fetch Git LFS assets so images/videos in public/ are real files, not pointers

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # GitHub Pages serves 404.html for unknown paths; use it so the SPA handles routes
      - name: Add 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      # Custom domain: CNAME tells GitHub Pages to serve this site at karenkodera.com
      - name: Add CNAME for custom domain
        run: echo "karenkodera.com" > dist/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
